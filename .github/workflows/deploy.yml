name: Deploy Laravel 11 - Production Safe

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Setup PHP 8.3 dengan ekstensi penting
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, pdo_mysql, openssl, tokenizer, xml

      # 3️⃣ Install Composer dependencies
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      # 4️⃣ Setup Node.js & build assets
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install NPM
        run: npm ci
      - name: Build Assets
        run: npm run build

      # 5️⃣ Zip project, kecuali .env, node_modules, .git
      - name: Zip Project
        run: zip -r release.zip . -x "node_modules/*" ".git/*" ".env"

      # 6️⃣ Upload zip ke VPS
      - name: Copy Release to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: release.zip
          target: /opt/just-atesting
          overwrite: true
          rm: true
          debug: true

      # 7️⃣ Deploy & setup di VPS (production safe)
      - name: Deploy & Setup on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/just-atesting
            cd /opt/just-atesting

            # Backup .env
            if [ -f .env ]; then
              cp .env .env.backup
            fi

            unzip -o release.zip
            rm release.zip

            composer install --no-dev --optimize-autoloader

            # Restore .env
            if [ -f .env.backup ]; then
              mv .env.backup .env
            fi

            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            if ! grep -q "APP_KEY=base64" .env; then
              php artisan key:generate --force
            fi

            php artisan migrate --force

            php artisan optimize:clear

            # Restart services
            systemctl restart php8.3-fpm
            systemctl restart nginx