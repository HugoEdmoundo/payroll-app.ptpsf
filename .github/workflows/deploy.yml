name: Deploy Laravel 11 - Production Safe

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, pdo_mysql, openssl, tokenizer, xml

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Zip Project
        run: zip -r release.zip . -x "node_modules/*" ".git/*" ".env"

      - name: Copy Release to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: release.zip
          target: /opt
          overwrite: true
          debug: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt

            # create dir if not exist
            mkdir -p just-atesting
            cd just-atesting

            # backup env BEFORE replace
            if [ -f .env ]; then
              cp .env /opt/.env.backup
            fi

            unzip -o ../release.zip
            rm ../release.zip

            # restore env
            if [ -f /opt/.env.backup ]; then
              mv /opt/.env.backup .env
            fi

            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            systemctl restart php8.3-fpm
            systemctl restart nginx